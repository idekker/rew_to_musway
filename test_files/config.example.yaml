# REW to Musway - Ioniq 5 calibration config

rew:
  host: localhost
  port: 4735

#tunest_pc:
#  exe_path: "D:\\Program Files (x86)\\TUNEST PC\\TUNEST_PC_FULL.exe"
#  model: "M6"

# Manual mode config — used when tunest_pc section is absent.
# Omit tunest_pc entirely to use manual mode.
manual:
  default_preset_path: "./test_files/default_preset.txt"
  spl_sanity_threshold: -10.0     # dB below target_spl to trigger warning
  timers:
    action_timeout: 10            # seconds for mute/solo prompts
    preset_load_timeout: 30       # seconds for preset load prompts

paths:
  output_dir: "./output"

playback:
  mode: manual                       # manual | rew_generator
  output_device: "EXCL: SPDIF Interface (SABRE 24/96 DAC_DigiT)"   # only used when mode=rew_generator
  output_channel: "L+R"             # only used when mode=rew_generator
  generator_signal: pink_periodic    # only used when mode=rew_generator
  generator_level: -12.0             # dBFS, only used when mode=rew_generator

measurement:
  rta_averages: 10
  smoothing: "1/6"

eq:
  manufacturer: "Musway"
  model: "31 bands (Output)"
  house_curve: "./test_files/house_curve.txt"
  match_range_margin: 1              # octaves beyond filter cutoff
  match_target:
    individual_max_boost: 6.0        # dB
    overall_max_boost: 6.0           # dB
    flatness_target: 1.0             # dB
    allow_narrow_filters_below_200hz: true
    vary_q_above_200hz: true
    allow_low_shelf: true
    low_shelf_range: [ -6.0, 6.0 ]     # dB
    allow_high_shelf: true
    high_shelf_range: [ -6.0, 6.0 ]    # dB

levels:
  target_spl: 65.0                   # dB SPL
  tolerance: 10.0                     # dB

channels:
  - number: 1
    name: "LF"
    group: front
    finetune_loops: 2                  # iterative refinement loops after EQ matching
    target:
      shape: bass_limited
      cutoff_hz: 55
      slope_db_per_octave: 24
    highpass:
      type: linkwitz_riley
      frequency: 50
      slope: 24
    lowpass: null

  - number: 2
    name: "RF"
    group: front
    target:
      shape: bass_limited
      cutoff_hz: 55
      slope_db_per_octave: 24
    highpass:
      type: linkwitz_riley
      frequency: 50
      slope: 24
    lowpass: null

  - number: 3
    name: "C"
    group: centre
    target:
      shape: bass_limited
      cutoff_hz: 55
      slope_db_per_octave: 24
      offset: -3.0                   # dB offset applied to calculated EQ target level
    highpass:
      type: linkwitz_riley
      frequency: 300
      slope: 24
    lowpass:
      type: linkwitz_riley
      frequency: 3500
      slope: 24

  - number: 4
    name: "LR"
    group: rear
    target:
      shape: bass_limited
      cutoff_hz: 55
      slope_db_per_octave: 24
    highpass:
      type: linkwitz_riley
      frequency: 300
      slope: 24
    lowpass:
      type: linkwitz_riley
      frequency: 3500
      slope: 24

  - number: 5
    name: "RR"
    group: rear
    target:
      shape: bass_limited
      cutoff_hz: 55
      slope_db_per_octave: 24
    highpass:
      type: linkwitz_riley
      frequency: 300
      slope: 24
    lowpass:
      type: linkwitz_riley
      frequency: 3500
      slope: 24

  - number: 6
    name: "Sub"
    group: sub
    target:
      shape: subwoofer
      cutoff_hz: 55
      slope_db_per_octave: 24
    highpass:
      type: linkwitz_riley
      frequency: 30
      slope: 24
    lowpass:
      type: linkwitz_riley
      frequency: 80
      slope: 24

combined_measurements:
  - name: "LF+Sub"
    channels: [ 1, 6 ]
  - name: "RF+Sub"
    channels: [ 2, 6 ]
  - name: "LF+RF"
    channels: [ 1, 2 ]
  - name: "LF+RF+Sub"
    channels: [ 1, 2, 6 ]
